services:
  tanzschule-db:
    image: postgres:17-alpine
    container_name: tanzschule-db
    environment:
      POSTGRES_DB: tanzschule
      POSTGRES_USER: tanzschule
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tanzschule}
    volumes:
      - tanzschule-db-data:/var/lib/postgresql/data
    networks:
      - tanzschule-net
    restart: unless-stopped

  tanzschule-service:
    build: .
    container_name: tanzschule-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://tanzschule-db:5432/tanzschule
      SPRING_DATASOURCE_USERNAME: tanzschule
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-tanzschule}
      JWT_SECRET: ${JWT_SECRET:-my-super-secret-jwt-key-that-should-be-changed-in-production-and-be-at-least-256-bits}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      GALLERY_UPLOAD_DIR: ${GALLERY_UPLOAD_DIR:-./uploads/gallery}
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      CONTACT_RECIPIENT: ${CONTACT_RECIPIENT:-mail@fynn-koch.de}
      CORS_ALLOWED_ORIGINS: https://tanzschule.fynn-koch.de,http://localhost:4200
    volumes:
      - ${GALLERY_UPLOAD_DIR:-./uploads/gallery}:${GALLERY_UPLOAD_DIR:-./uploads/gallery}
    depends_on:
      - tanzschule-db
    networks:
      - tanzschule-net
    restart: unless-stopped

volumes:
  tanzschule-db-data:

networks:
  tanzschule-net:
    name: tanzschule-net
