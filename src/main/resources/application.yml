spring:
  application:
    name: dance-school-service

  datasource:
    url: jdbc:postgresql://localhost:5432/dance_school
    username: dance_school
    password: dance_school
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:noreply@example.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

security:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-jwt-key-that-should-be-changed-in-production-and-be-at-least-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}

admin:
  default-username: ${ADMIN_USERNAME:admin}
  default-password: ${ADMIN_PASSWORD:admin}

gallery:
  upload-dir: ${GALLERY_UPLOAD_DIR:./uploads/gallery}

contact:
  recipient: ${CONTACT_RECIPIENT:mail@fynn-koch.de}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

springdoc:
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
