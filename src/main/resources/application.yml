spring:
  application:
    name: tanzschule-family-and-friends-service

  datasource:
    url: jdbc:postgresql://localhost:5432/tanzschule
    username: tanzschule
    password: tanzschule
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-jwt-key-that-should-be-changed-in-production-and-be-at-least-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}

admin:
  default-username: ${ADMIN_USERNAME:admin}
  default-password: ${ADMIN_PASSWORD:admin}

gallery:
  upload-dir: ${GALLERY_UPLOAD_DIR:./uploads/gallery}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
