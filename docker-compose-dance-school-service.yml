services:
  dance-school-db:
    image: postgres:18.3-alpine
    container_name: dance-school-db
    environment:
      POSTGRES_DB: dance_school
      POSTGRES_USER: dance_school
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dance_school}
    volumes:
      - dance-school-db-data:/var/lib/postgresql
    networks:
      - dance-school-net
    restart: unless-stopped

  dance-school-service:
    build: .
    container_name: dance-school-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://dance-school-db:5432/dance_school
      SPRING_DATASOURCE_USERNAME: dance_school
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-dance_school}
      JWT_SECRET: ${JWT_SECRET:-my-super-secret-jwt-key-that-should-be-changed-in-production-and-be-at-least-256-bits}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      GALLERY_UPLOAD_DIR: ${GALLERY_UPLOAD_DIR:-./uploads/gallery}
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      CONTACT_RECIPIENT: ${CONTACT_RECIPIENT:-mail@fynn-koch.de}
      CORS_ALLOWED_ORIGINS: https://dance-school.fynn-koch.de,http://localhost:4200
    volumes:
      - ${GALLERY_UPLOAD_DIR:-./uploads/gallery}:${GALLERY_UPLOAD_DIR:-./uploads/gallery}
    depends_on:
      - dance-school-db
    networks:
      - dance-school-net
    restart: unless-stopped

volumes:
  dance-school-db-data:

networks:
  dance-school-net:
    name: dance-school-net
